schemaVersion: 2.0.0

commandTests:
  - name: OS version check
    command: cat
    args: [/etc/os-release]
    expectedOutput: [VERSION_ID=3\.23]

  - name: Required tools installed
    command: bash
    args:
      - -lc
      - command -v bash >/dev/null 2>&1 && command -v git >/dev/null 2>&1 && command -v git-lfs >/dev/null 2>&1

  - name: Temporary and APK cache cleaned
    command: bash
    args:
      - -lc
      - >-
        test ! -f /tmp/alpine-packages.txt &&
        (test ! -d /var/cache/apk || test -z "$(find /var/cache/apk -mindepth 1 -maxdepth 1 2>/dev/null)") &&
        (test ! -d /root/.cache || test -z "$(find /root/.cache -mindepth 1 -maxdepth 1 2>/dev/null)")

  - name: Entrypoint handles default repository path
    command: bash
    args:
      - -lc
      - |
        set -e
        rm -rf /tmp/ws /tmp/remote.git
        mkdir -p /tmp/ws
        git init /tmp/ws
        git -C /tmp/ws config user.name test
        git -C /tmp/ws config user.email test@example.com
        touch /tmp/ws/.keep
        git -C /tmp/ws add .
        git -C /tmp/ws commit -m init
        git init --bare /tmp/remote.git
        git -C /tmp/ws remote add origin /tmp/remote.git
        GITHUB_WORKSPACE=/tmp/ws \
        GITHUB_ACTOR=tester \
        GITHUB_REPOSITORY=owner/repo \
        GITHUB_OUTPUT=/tmp/github_output.txt \
        GITHUB_TOKEN=fake \
        INPUT_ORGANIZATION_DOMAIN=github.com \
        INPUT_REPOSITORY_PATH=. \
        INPUT_AMEND=false \
        INPUT_ALLOW_EMPTY_COMMIT=false \
        INPUT_TARGET_BRANCH='' \
        /entrypoint.sh
fileExistenceTests:
  - name: entrypoint exists
    path: /entrypoint.sh
    shouldExist: true
    permissions: -rwxr-xr-x

metadataTest:
  workdir: /github/workspace
  entrypoint: [/entrypoint.sh]
